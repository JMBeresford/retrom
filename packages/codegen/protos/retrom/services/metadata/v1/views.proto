// Metadata views represent useful aggregations of metadata for various use cases in which the required data
// is fragmented across multiple tables in the database.

syntax = "proto3";

package retrom.services.metadata.v1;

import "retrom/services/metadata/v1/models.proto";

// A comprehensive view of game metadata.
message GameMetadataView {
  // The core game metadata fields for this game.
  GameMetadata metadata = 1;
  // A list of artworks associated with this game.
  repeated GameMetadataArtwork artworks = 2;
  // A list of screenshots associated with this game.
  repeated GameMetadataScreenshot screenshots = 3;
  // A list of videos associated with this game.
  repeated GameMetadataVideo videos = 4;
  // A list of links associated with this game.
  repeated GameMetadataLink links = 5;
  // A list of similar game IDs associated with this game.
  repeated string similar_game_ids = 7;
}

// A comprehensive view of platform metadata.
message PlatformMetadataView {
  // The core platform metadata fields for this platform.
  PlatformMetadata metadata = 1;
}
