syntax = "proto3";

package retrom.services.metadata.v1;

import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "retrom/providers/igdb/v1/igdb.proto";
import "retrom/services/library/v1/models.proto";
import "retrom/services/metadata/v1/models.proto";

service MetadataService {
  rpc GetGameMetadata(GetGameMetadataRequest) returns (GetGameMetadataResponse);
  rpc UpdateGameMetadata(UpdateGameMetadataRequest) returns (UpdateGameMetadataResponse);

  rpc GetPlatformMetadata(GetPlatformMetadataRequest) returns (GetPlatformMetadataResponse);
  rpc UpdatePlatformMetadata(UpdatePlatformMetadataRequest) returns (UpdatePlatformMetadataResponse);

  rpc GetIgdbSearch(GetIgdbSearchRequest) returns (GetIgdbSearchResponse);
  rpc GetIgdbGameSearchResults(GetIgdbGameSearchResultsRequest) returns (GetIgdbGameSearchResultsResponse);
  rpc GetIgdbPlatformSearchResults(GetIgdbPlatformSearchResultsRequest) returns (GetIgdbPlatformSearchResultsResponse);

  rpc SyncSteamMetadata(SyncSteamMetadataRequest) returns (SyncSteamMetadataResponse);

  rpc GetLocalMetadataStatus(GetLocalMetadataStatusRequest) returns (GetLocalMetadataStatusResponse);
  rpc DeleteLocalMetadata(DeleteLocalMetadataRequest) returns (DeleteLocalMetadataResponse);

  rpc GetMetadataProviders(GetMetadataProvidersRequest) returns (GetMetadataProvidersResponse);
}

message GetMetadataProvidersRequest {}

message GetMetadataProvidersResponse {
  repeated MetadataProvider providers = 1;
}

message GetGameMetadataRequest {
  repeated string game_ids = 1;
}

message GetGameMetadataResponse {
  message SimilarGames {
    repeated retrom.services.library.v1.Game value = 1;
  }

  // paths to media assets, relative to the global metadata dir or served HTTP endpoints
  message MediaPaths {
    optional string cover_url = 1;
    optional string background_url = 2;
    optional string icon_url = 3;
    repeated string video_urls = 4;
    repeated string screenshot_urls = 5;
    repeated string artwork_urls = 6;
  }

  repeated GameMetadata metadata = 1;
  map<string, SimilarGames> similar_games = 2;
  map<string, MediaPaths> media_paths = 3;
}

message GetPlatformMetadataRequest {
  repeated string platform_ids = 1;
}

message GetPlatformMetadataResponse {
  repeated PlatformMetadata metadata = 1;
}

message GetIgdbGameSearchResultsRequest {
  retrom.providers.igdb.v1.IgdbGameSearchQuery query = 1;
}

message GetIgdbGameSearchResultsResponse {
  repeated GameMetadata metadata = 1;
}

message UpdateGameMetadataRequest {
  repeated GameMetadata metadata = 1;
}

message UpdateGameMetadataResponse {
  repeated GameMetadata metadata_updated = 1;
}

message GetIgdbPlatformSearchResultsRequest {
  retrom.providers.igdb.v1.IgdbPlatformSearchQuery query = 1;
}

message GetIgdbPlatformSearchResultsResponse {
  repeated PlatformMetadata metadata = 1;
}

message UpdatePlatformMetadataRequest {
  repeated PlatformMetadata metadata = 1;
}

message UpdatePlatformMetadataResponse {
  repeated PlatformMetadata metadata_updated = 1;
}

// Arbitrary search query for IGDB
message GetIgdbSearchRequest {
  enum IgdbSearchType {
    GAME = 0;
    PLATFORM = 1;
  }

  IgdbSearchType search_type = 1;
  optional retrom.providers.igdb.v1.IgdbSearch search = 2;
  optional retrom.providers.igdb.v1.IgdbPagination pagination = 3;
  optional retrom.providers.igdb.v1.IgdbFilters filters = 4;
  optional retrom.providers.igdb.v1.IgdbFields fields = 5;
}

message IgdbSearchGameResponse {
  repeated GameMetadata games = 1;
}

message IgdbSearchPlatformResponse {
  repeated PlatformMetadata platforms = 1;
}

message GetIgdbSearchResponse {
  oneof search_results {
    IgdbSearchGameResponse game_matches = 1;
    IgdbSearchPlatformResponse platform_matches = 2;
  }
}

message SyncSteamMetadataRequest {
  message Selector {
    string game_id = 1;
  }

  repeated Selector selectors = 1;
}

message SyncSteamMetadataResponse {}

message GetLocalMetadataStatusRequest {}

message GetLocalMetadataStatusResponse {
  int64 total_byte_size = 1;
  int32 total_files = 2;
}

message DeleteLocalMetadataRequest {}

message DeleteLocalMetadataResponse {}
