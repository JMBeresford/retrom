syntax = "proto3";

package retrom.services.metadata.v1;

import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";

message GameMetadata {
  string id = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  string game_id = 2;
  google.protobuf.Timestamp created_at = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  google.protobuf.Timestamp updated_at = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
  optional string name = 5;
  optional string description = 6;
  optional string cover_url = 7;
  optional string background_url = 8;
  optional string icon_url = 9;
  optional string logo_url = 10;
  optional int64 igdb_id = 11;
  repeated string links = 12;
  google.protobuf.Timestamp release_date = 13;
  google.protobuf.Timestamp last_played = 14;
  optional int32 minutes_played = 15;
  string provider_id = 16;
}

message PlatformMetadata {
  string id = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  string platform_id = 2;
  google.protobuf.Timestamp created_at = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  google.protobuf.Timestamp updated_at = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
  optional string name = 5;
  optional string description = 6;
  optional string background_url = 7;
  optional string icon_url = 8;
  optional string logo_url = 9;
  optional int64 igdb_id = 10;
  string provider_id = 11;
}

message SimilarGame {
  string game_id = 1;
  string similar_game_id = 2;
  optional google.protobuf.Timestamp created_at = 3;
  optional google.protobuf.Timestamp updated_at = 4;
}

// MetadataProvider represents a registered metadata source (e.g. IGDB, Steam).
// Well-known providers are seeded at startup.
message MetadataProvider {
  string id = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  string name = 2;
  google.protobuf.Timestamp created_at = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  google.protobuf.Timestamp updated_at = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// VideoMetadata is a single video URL associated with a game_metadata record.
// Normalises the deprecated game_metadata.video_urls array column.
message VideoMetadata {
  string id = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  // References game_metadata.id.
  string game_metadata_id = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
  string url = 3;
  google.protobuf.Timestamp created_at = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
  google.protobuf.Timestamp updated_at = 5 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// ScreenshotMetadata is a single screenshot URL associated with a game_metadata record.
// Normalises the deprecated game_metadata.screenshot_urls array column.
message ScreenshotMetadata {
  string id = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  // References game_metadata.id.
  string game_metadata_id = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
  string url = 3;
  google.protobuf.Timestamp created_at = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
  google.protobuf.Timestamp updated_at = 5 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// ArtworkMetadata is a single artwork URL associated with a game_metadata record.
// Normalises the deprecated game_metadata.artwork_urls array column.
message ArtworkMetadata {
  string id = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  // References game_metadata.id.
  string game_metadata_id = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
  string url = 3;
  google.protobuf.Timestamp created_at = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
  google.protobuf.Timestamp updated_at = 5 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// LinkMetadata is a single URL link associated with a game_metadata record.
// Normalises the deprecated game_metadata.links array column.
message LinkMetadata {
  // References game_metadata.id.
  string game_metadata_id = 1;
  string url = 2;
}
