syntax = "proto3";

package retrom.services.jobs.v1;

import "google/protobuf/timestamp.proto";

// JobStatus represents the current status of a job.
enum JobStatus {
  // Unspecified status.
  JOB_STATUS_UNSPECIFIED = 0;
  // The job is pending and has not yet started.
  JOB_STATUS_PENDING = 1;
  // The job is currently running.
  JOB_STATUS_RUNNING = 2;
  // The job has completed successfully.
  JOB_STATUS_COMPLETE = 3;
  // The job has failed.
  JOB_STATUS_FAILED = 4;
}

// Live mutable state of a job; emitted by WatchJob and embedded in Job.
message JobProgress {
  // Unique identifier of the job.
  string id = 1;
  // Current status of the job.
  JobStatus status = 2;
  // Completion ratio in the range [0.0, 1.0].
  float percent_complete = 3;
  // Optional message providing additional context or details about the job's progress.
  string message = 4;
}

// Job represents a unit of work in Retrom.
message Job {
  // Unique identifier of the job.
  string id = 1;
  // Name of the job.
  string name = 2;
  // Current progress of the job.
  JobProgress progress = 4;
  // Timestamp when the job was created.
  google.protobuf.Timestamp created_at = 6;
  // Timestamp when the job was last updated.
  google.protobuf.Timestamp updated_at = 7;
  // Populated when the job reaches a terminal state (complete or failed).
  optional google.protobuf.Timestamp finished_at = 8;
}
