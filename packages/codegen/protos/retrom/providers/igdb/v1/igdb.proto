syntax = "proto3";

package retrom.providers.igdb.v1;

message IgdbSearch {
  string value = 1;
}

message IgdbPagination {
  optional int32 limit = 1;
  optional int32 offset = 2;
}

message IgdbFilters {
  enum FilterOperator {
    EQUAL = 0;
    NOT_EQUAL = 1;
    GREATER_THAN = 2;
    GREATER_THAN_OR_EQUAL = 3;
    LESS_THAN = 4;
    LESS_THAN_OR_EQUAL = 5;
    PREFIX_MATCH = 6;
    SUFFIX_MATCH = 7;
    INFIX_MATCH = 8;
    ANY = 9;
    ALL = 10;
    NONE = 11;
    NOT_ALL = 12;
    EXACT = 13;
  }

  message FilterValue {
    string value = 1;
    optional FilterOperator operator = 2;
  }

  // map of field name to filter operation
  map<string, FilterValue> filters = 1;
}

message IgdbFields {
  message IncludeFields {
    repeated string value = 1;
  }

  message ExcludeFields {
    repeated string value = 1;
  }

  oneof selector {
    IncludeFields include = 1;
    ExcludeFields exclude = 2;
  }
}
