[package]
name = "retrom-service-metadata"
resolver = "2"
version.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true
edition.workspace = true
description = "Metadata service handler for the Retrom video game library service"

[[bin]]
name = "retrom-service-metadata"
path = "src/main.rs"

[dependencies]
retrom-codegen = { workspace = true }
retrom-db = { workspace = true }
retrom-service-common = { workspace = true }
retrom-service-config = { workspace = true }
retrom-service-jobs = { workspace = true }
retrom-telemetry = { workspace = true }
deadpool = { workspace = true }
tonic = { workspace = true }
tonic-web = { workspace = true }
tonic-reflection = { workspace = true }
axum = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
futures = { workspace = true }
walkdir = { workspace = true }
chrono = { workspace = true }
dotenvy = { workspace = true }
sqlx = { workspace = true }
uuid = { workspace = true }

[features]
default = []
sqlite = ["retrom-db/sqlite"]
postgres = ["retrom-db/postgres"]
