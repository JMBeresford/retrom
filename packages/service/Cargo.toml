[package]
name = "retrom-service"
resolver = "2"
version.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true
edition.workspace = true
description = "The Retrom video game library service"

[dependencies]
dotenvy = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
retrom-db = { workspace = true }
retrom-codegen = { workspace = true }
retrom-service-common = { workspace = true }
retrom-telemetry = { workspace = true }
retrom-grpc-service = { workspace = true }
retrom-rest-service = { workspace = true }
retrom-webdav-service = { workspace = true }
reqwest = { workspace = true }
futures = { workspace = true }
tower = { workspace = true }
hyper = { workspace = true }
hyper-util = { workspace = true }
http = { workspace = true }
config = { workspace = true }
opentelemetry-otlp = { workspace = true }

[features]
default = []
sqlite = ["retrom-db/sqlite", "retrom-rest-service/sqlite"]
postgres = ["retrom-db/postgres", "retrom-rest-service/postgres"]

[target.'cfg(not(windows))'.dependencies]
signal-hook = { workspace = true }
signal-hook-tokio = { workspace = true }
