name: Agents sync check

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  agents-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make scripts executable
        run: chmod +x .agents/scripts/*.sh
      - name: Check skill links
        run: ./.agents/scripts/check-links.sh check
      - name: Check MCP sync
        run: ./.agents/scripts/sync-mcp.sh check
